name: Close stale issues and PRs

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: "60일간 활동이 없어 stale 로 표시합니다. 14일 내 활동이 없으면 자동으로 닫힙니다."
          stale-pr-message: "60일간 활동이 없어 stale 로 표시합니다. 14일 내 활동이 없으면 자동으로 닫힙니다."
          exempt-issue-labels: "pinned,security"
          exempt-pr-labels: "pinned,security"